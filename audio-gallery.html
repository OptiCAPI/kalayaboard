<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ম্যাজিকাল ইমোজি জুকবক্স | ১২নং কালাইয়া বোর্ড সপ্রাবি</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Atma:wght@600;700&display=swap');
        
        :root {
            --bg-violet: #2e0249;
        }

        body {
            background: linear-gradient(135deg, #2e0249 0%, #570a57 50%, #a91079 100%);
            background-attachment: fixed;
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
            color: white;
            transition: background 1.5s ease;
            overflow-x: hidden;
            position: relative;
        }

        .kids-font { font-family: 'Atma', cursive; }
        
        /* প্রতিটি অক্ষরের বেসিক স্টাইল */
        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s ease-out;
            font-weight: bold;
        }
        /* যখন অ্যানিমেশন হয়ে অক্ষরটি দেখাবে */
        .letter.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ৩টি আলাদা উজ্জ্বল রঙের প্যালেট */
        .letter:nth-child(4n+1) { color: #FFD700; } /* সোনালী */
        .letter:nth-child(4n+2) { color: #00FFCC; } /* ফিরোজা */
        .letter:nth-child(4n+3) { color: #FF69B4; } /* গোলাপি */
        .letter:nth-child(4n+4) { color: #00DBDE; } /* নীল */
        
        /* আগের গ্লো অ্যানিমেশনটি সরিয়ে শুধু সাধারণ রাখা হয়েছে */
        .animated-letter {
            display: inline-block;
            /* এখানে আর কোনো filter বা drop-shadow নেই */
        }
        /* --- জাদুকরী ইমোজি বাবল স্টাইল --- */
        .bubbles-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: rise 10s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-1200px) rotate(360deg) scale(1.5); opacity: 0; }
        }

        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .back-btn:hover {
            background: white;
            color: var(--bg-violet);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* --- প্লেয়ার ইন্টারফেস --- */
        .player-card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 35px;
            margin-top: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
        }

        .highlight-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(169, 16, 121, 0.5);
            font-weight: 700;
        }

        /* --- 4+ Tabs Scrolling Style --- */
        .premium-tabs {
            display: flex; 
            overflow-x: auto; /* বেশি ট্যাব থাকলে স্ক্রল করা যাবে */
            gap: 12px; 
            margin: 25px 0;
            padding-bottom: 10px;
            scrollbar-width: none; /* ফায়ারফক্সের জন্য স্ক্রলবার হাইড */
        }
        .premium-tabs::-webkit-scrollbar { display: none; /* ক্রোমের জন্য স্ক্রলবার হাইড */ }
        
        .tab-btn {
            white-space: nowrap; /* টেক্সট ভেঙে নিচে নামবে না */
            padding: 10px 25px; border-radius: 50px; border: none;
            background: rgba(255,255,255,0.1); color: white;
            font-weight: bold; transition: 0.4s;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease; /* অ্যানিমেশনটি স্মুথ হবে */
        }
        .tab-btn.active {
            background: white; color: var(--bg-violet);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }
        /* ইনঅ্যাক্টিভ ট্যাবে হোভার করলে যা হবে */
        .tab-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.35); /* হালকা সাদা ব্যাকগ্রাউন্ড */
            transform: translateY(-3px); /* সামান্য ওপরে উঠবে */
            color: white; /* লেখার রং সাদা থাকবে */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); /* নিচে হালকা ছায়া */
            cursor: pointer;
        }
        
        .play-btn:hover { transform: scale(1.1); }
        
        /* --- 2 Column Grid Style for Songs --- */
        .song-list-scroll {
            max-height: 400px; 
            overflow-y: auto; 
            padding: 5px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* এখানে ২ কলাম ফিক্সড করা হলো */
            gap: 15px; /* কলামের মাঝখানের ফাঁকা জায়গা */
        }
        
        /* মোবাইলে স্ক্রিন ছোট হলে ১ কলাম হয়ে যাবে */
        @media (max-width: 768px) {
            .song-list-scroll {
                grid-template-columns: 1fr;
            }
        }
        /* ১. সাধারণ অবস্থায় টাইটেল (Gradient Text) */
        .song-card {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px; padding: 15px; 
            display: flex; align-items: center; cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 0 !important; /* গ্রিডের কারণে মার্জিন রিমুভ */
        } 
        .song-card:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: translateY(-8px); /* ওপরের দিকে একটু উঠবে */
        }
		/* ২. যখন গানটি বাজবে (Active State) */
        .song-card.active {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            border: 2px solid white;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.4);
        }
		/* কার্ডের ভেতরে আইকনের রঙ */
		.song-card .fs-3 i {
		    background: linear-gradient(135deg, #fff 0%, #00dbde 100%);
		    -webkit-background-clip: text;
		    -webkit-text-fill-color: transparent;
		}
        .play-btn-main {
            width: 85px; height: 85px; background: white; color: var(--bg-violet);
            border-radius: 50%; border: none; font-size: 2.5rem;
            box-shadow: 0 0 35px rgba(255,255,255,0.4);
            transition: 0.3s;
            animation: waveCall 2s infinite ease-in-out, buttonPulse 2s infinite;
            cursor: pointer;
            z-index: 10;
        }
        
        .play-btn-main:hover { transform: scale(1.1); }

        .progress-custom {
            height: 12px; background: rgba(255,255,255,0.15); border-radius: 10px;
            margin: 25px 0; cursor: pointer; position: relative;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #00dbde, #fc00ff);
            width: 0%; border-radius: 10px; transition: 0.1s;
        }
		/* বাটনটি ঢেউয়ের মতো দুলবে এবং ডাকবে */
        @keyframes waveCall {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); } /* একটু ওপরে উঠবে এবং বড় হবে */
            100% { transform: translateY(0) scale(1); }
        }
        /* চারপাশ দিয়ে গ্লো (Glow) ছড়াবে */
        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* ১. অ্যাক্টিভ গানের গ্লো অ্যানিমেশন */
        @keyframes activeGlow {
            0% { box-shadow: 0 0 5px #fff, 0 0 10px #ff00cc; border-color: #fff; }
            50% { box-shadow: 0 0 20px #fff, 0 0 30px #3333ff; border-color: #00dbde; }
            100% { box-shadow: 0 0 5px #fff, 0 0 10px #ff00cc; border-color: #fff; }
        }
        nowPlayingCat {
		    transition: color 0.5s ease; /* এটি রং বদলানোর সময় ০.৫ সেকেন্ড সময় নেবে */
		}
        .song-card.active {
            animation: activeGlow 2s infinite ease-in-out;
            background: linear-gradient(90deg, #ff00cc, #3333ff) !important;
            transform: scale(1.02);
            z-index: 2;
        }
        
        /* ২. ইনঅ্যাক্টিভ গানগুলোর হালকা দুলুনি (Wiggle) */
        @keyframes slowWiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }
        
        .song-card:not(.active) {
            animation: slowWiggle 4s infinite ease-in-out;
            /* গানগুলোর দুলুনি যেন একেকটার একেক সময় হয় সেজন্য নিচের লাইনটি */
            animation-delay: calc(var(--i, 1) * 0.2s); 
        }
        
        /* হোভার করলে দুলুনি বন্ধ হয়ে যাবে */
        .song-card:hover {
            animation-play-state: paused;
        }
        
    </style>
</head>
<body>

<div class="bubbles-container" id="bubbleContainer"></div>

<div class="container py-4">
    <div class="text-center mb-4">
        <h1 class="kids-font highlight-text display-4" id="animatedTitle">✨ জাদুকরী গানের মেলা</h1>
        <p class="opacity-75 fs-5">১২নং কালাইয়া বোর্ড সরকারি প্রাথমিক বিদ্যালয়</p>
        
        <div class="mt-3">
            <a href="javascript:void(0);" onclick="window.history.back();" class="back-btn">
                <i class="fas fa-arrow-left me-2"></i> পিছনে ফিরে যাও
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10 col-md-10">
            <div class="player-card">
                <i class="fas fa-music fa-spin" style="color: #00dbde"></i>
                <h2 class="kids-font highlight-text" id="nowPlayingTitle">একটি ছড়া বেছে নাও</h2>
                <p id="nowPlayingCat" class="text-info fw-bold fs-5">স্বাগতম, ছোট বন্ধুরা!</p>

                <div class="progress-custom" onclick="seek(event)">
                    <div class="progress-fill" id="progBar"></div>
                </div>

                <div class="d-flex justify-content-center align-items-center gap-4">
                    <button class="btn btn-outline-light rounded-circle p-3" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
                    <button class="play-btn-main" id="masterPlay" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="btn btn-outline-light rounded-circle p-3" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
            <div class="premium-tabs">
                <button class="tab-btn active" onclick="changeTab('ছড়া ও কবিতা', this)">🎬 ছড়া ও কবিতা</button>
                <button class="tab-btn" onclick="changeTab('দেশাত্মবোধক', this)">দেশাত্মবোধক</button>
                <button class="tab-btn" onclick="changeTab('২১শে ফেব্রুয়ারি', this)">🌸 ২১শে ফেব্রুয়ারি</button>
                <button class="tab-btn" onclick="changeTab('বিজয় দিবস', this)">✌️ বিজয় দিবস</button>
            </div>
            
            <div class="song-list-scroll" id="songList">
            </div>
        </div>
    </div>
</div>

<audio id="mainAudio" ontimeupdate="updateProgress()" onended="nextSong()"></audio>

<script>
    window.onload = function() {
      const title = document.getElementById('animatedTitle');
      const text = title.innerText;
      title.innerHTML = ''; // অরিজিনাল টেক্সট মুছে ফেলা
  
      // Intl.Segmenter ব্যবহার করে কার চিহ্নসহ অক্ষর ভাগ করা
      const segmenter = new Intl.Segmenter('bn', { granularity: 'grapheme' });
      const segments = Array.from(segmenter.segment(text));
  
      segments.forEach((segment, index) => {
          const char = segment.segment;
          const span = document.createElement('span');
          span.innerText = char === " " ? "\u00A0" : char; 
          span.className = 'letter';
          title.appendChild(span);
  
          // একটু সময় বিরতি দিয়ে একটির পর একটি অক্ষর দেখানো
          setTimeout(() => {
              span.classList.add('show');
              // শুধু অক্ষরের ওপর অ্যানিমেশন হবে, স্পেস বা ইমোজিতে নয়
              if(char.trim() !== "" && char !== "✨") span.classList.add('animated-letter');
          }, index * 150); // স্লো নেটে সুন্দর দেখানোর জন্য ১৫০ms গ্যাপ
      });
      
      // আগের বাবল এবং গান রেন্ডার ফাংশনগুলো কল করা
      createBubbles();
      renderSongs();
  };
    const audio = document.getElementById('mainAudio');
    const songListDiv = document.getElementById('songList');

   // ১. আপনার নতুন সাজানো ক্যাটাগরি গ্রুপ (এখানে বারবার cat লিখতে হবে না)
	const songCategories = {
	    "ছড়া ও কবিতা": [
			{ title: "হাট্টিমা টিম টিম ১", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771690175/Hattima_tim_tim_1_ivloel.mp3", icon: "fa-bird" },
			{ title: "আতা গাছে তোতা পাখি ১", file: "https://www.dropbox.com/scl/fi/88migeohmqr4adsukztyd/2.mp3?rlkey=6ze2v2zv3sb590jfx90ux6zvo&raw=1", icon: "fa-crow" },
			{ title: "হাট্টিমা টিম টিম ২", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771690151/hattima_tim_tim_2_zgjsd7.mp3", icon: "fa-bird" },
	        { title: "ঐ দেখা যায় তালগাছ ১", file: "https://www.dropbox.com/scl/fi/eeb7g8rxda1kz5kaxrjtm/0i-dekha-jay-khokon-khokon.mp3?rlkey=o9r9tkfox2z0s056g8axhopst&raw=1", icon: "fa-tree" },
	        { title: "সকালে উঠিয়া আমি ১", file: "https://www.dropbox.com/scl/fi/ujwwml2hw933fq9p6ph8p/3.mp3?rlkey=r0s8ieeqo1286bw6n5j9vodij&raw=1", icon: "fa-tree" },
	        { title: "ঐ দেখা যায় তালগাছে ২", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771685201/%E0%A6%90_%E0%A6%A6%E0%A7%87%E0%A6%96%E0%A6%BE_%E0%A6%AF%E0%A6%BE%E0%A7%9F_%E0%A6%A4%E0%A6%BE%E0%A6%B2_%E0%A6%97%E0%A6%BE%E0%A6%9B_version_1.mp3_gg5fyc.mp3", icon: "fa-tree" },
	        { title: "আতা গাছে তোতা পাখি ২", file: 'https://www.dropbox.com/scl/fi/c82dqtlc6fkurl1cbszbq/.mp3?rlkey=bxy01uuio9rhwv7jd6tn6cjbm&raw=1', icon: "fa-crow" },
	        { title: "সকালে উঠিয়া আমি ২", file: "https://www.dropbox.com/scl/fi/cbh6isqapepui5mh4dcs0/.mp3?rlkey=5zhwz6tn0yohh7652hakaptcx&raw=1", icon: "fa-tree" },
	        { title: "সকালে উঠিয়া আমি ৩", file: "https://www.dropbox.com/scl/fi/2xtcqw0ldhjdls555dqr6/1.mp3?rlkey=ccregs94poybv0911esuslvcx&raw=1", icon: "fa-tree" },
			{ title: "খোকন খোকন ডাক পাড়ি ১", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771693813/%E0%A6%96%E0%A7%8B%E0%A6%95%E0%A6%A8_%E0%A6%96%E0%A7%8B%E0%A6%95%E0%A6%A8_%E0%A6%A1%E0%A6%BE%E0%A6%95_%E0%A6%AA%E0%A6%BE%E0%A6%A1%E0%A6%BC%E0%A6%BF_%E0%A6%96%E0%A7%8B%E0%A6%95%E0%A6%A8_%E0%A6%AE%E0%A7%8B%E0%A6%A6%E0%A7%87%E0%A6%B0_%E0%A6%95%E0%A6%BE%E0%A6%B0_%E0%A6%AC%E0%A6%BE%E0%A6%A1%E0%A6%BC%E0%A6%BF_3_en27fc.mp3", icon: "fa-baby" },
	        { title: "খোকন খোকন ডাক পাড়ি ২", file: "https://www.dropbox.com/scl/fi/5zvwsu6l0dl5thczq9f36/New-Project.mp3?rlkey=4rvqplzstksorkkyiog4l1h6h&raw=1", icon: "fa-baby" },
			{ title: "দাদুর মাথায় টাক ছিল ১", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771687066/Dadu_s_Bald_Head_Buzz_saqpxl.mp3", icon: "fa-man" },
			{ title: "দাদুর মাথায় টাক ছিল ২", file: "https://res.cloudinary.com/dyrshitkf/video/upload/v1771687067/%E0%A6%A6%E0%A6%BE%E0%A6%A6%E0%A7%81%E0%A6%B0_%E0%A6%AE%E0%A6%BE%E0%A6%A5%E0%A6%BE%E0%A6%AF%E0%A6%BC_%E0%A6%9F%E0%A6%BE%E0%A6%95_%E0%A6%9B%E0%A6%BF%E0%A6%B2_%E0%A6%9F%E0%A6%BE%E0%A6%95_%E0%A6%9B%E0%A6%BF%E0%A6%B2_woe5bs.mp3", icon: "fa-man" }
	    ],
	    
	    "দেশাত্মবোধক": [
	        { title: "আমার সোনার বাংলা (জাতীয় সংগীত)", file: "https://www.dropbox.com/scl/fi/vawpwe9xs70cs37ow2356/Amar-sonar-bangla.mp3?rlkey=q3gszt18eahjti5jom1p6ivl3&raw=1", icon: "fa-flag" },
	        { title: "আমি বাংলার গান গাই", file: "https://www.dropbox.com/scl/fi/s4eg9uy4rfptot5uuhd43/Ami-Banglar-Gan-Gai.mp3?rlkey=ft572jhkr43eoip2qqw5hq6i8&raw=1", icon: "fa-heart" },
	        { title: "ও আমার বাংলা মা তোর", file: "https://www.dropbox.com/scl/fi/ozhssfk012ok5tk056gy3/Utpal-M-O-Amar-Bangla-Ma-Tor.mp3?rlkey=1dbf87ug6a8i48e0bl51szm11&raw=1", icon: "fa-heart" },
	        { title: "জাতীয় সংগীত (মিউজিক)", file: "https://www.dropbox.com/scl/fi/4o8hw8kkkkwzuusqs1dzt/Amar-Shonar-Bangla-instu-mntal.mp3?rlkey=aqgwwmy4899wzwibkegujfu2t&raw=1", icon: "fa-heart" }
	    ],
	    
	    "২১শে ফেব্রুয়ারি": [
	        { title: "আমার ভাইয়ের রক্তে রাঙানো", file: "https://www.dropbox.com/scl/fi/5mlg0gisrbzkpuq7fjgdk/Amar-Vaier-Rokte-Rangano.mp3?rlkey=zlwpkqq5icyspfrhv54arqovq&raw=1", icon: "fa-flower-tulip" },
	        { title: "আমার ভাইয়ের রক্তে রাঙানো (Noble)", file: "https://www.dropbox.com/scl/fi/vg6jd4to2tx8ysl9oycv8/Amar-Vaiyer-Rokte-Rangano-Ekushe-February-Noble.mp3?rlkey=68uhgmswulqt5urs2dlhfy7o5&raw=1", icon: "fa-flower-tulip" },
	        { title: "মোদের গরব মোদের আশা", file: "https://www.dropbox.com/scl/fi/cfz8bs0xpj19oqy45doqm/Moder-Gorob-Moder-Asha-female.mp3?rlkey=vd5nwbqqwzfpvddcbulye6ekk&raw=1", icon: "fa-alphabet-bangla" }
	    ],
	    
	    "বিজয় দিবস": [
	        { title: "বিজয় নিশান উড়ছে ওই", file: "bijoy.mp3", icon: "fa-flag" },
			{ title: "বিজয় নিশান উড়ছে ওই", file: "bijoy.mp3", icon: "fa-flag" }
	    ]
	};
	
	// ২. স্বয়ংক্রিয়ভাবে আপনার সাজানো গ্রুপগুলো থেকে allSongs অ্যারে তৈরি করার ম্যাজিক লজিক
	let allSongs = [];
	for (const category in songCategories) {
	    songCategories[category].forEach(song => {
	        allSongs.push({
	            title: song.title,
	            file: song.file,
	            icon: song.icon,
	            cat: category // এখানে গ্রুপ থেকে ক্যাটাগরির নাম নিজে নিজেই যুক্ত হয়ে যাবে!
	        });
	    });
	}
    let currentIdx = -1;
    let activeTab = 'ছড়া ও কবিতা';

    // ১. অটো কালার চেঞ্জার (Hue Rotation)
    let hue = 270; 
    setInterval(() => {
        hue = (hue + 12) % 360;
        document.body.style.background = `linear-gradient(135deg, hsl(${hue}, 80%, 15%) 0%, hsl(${(hue+40)%360}, 80%, 25%) 100%)`;
    }, 1500);

    // ২. ইমোজি বাবল ফাংশন (আপডেটেড)
    function createBubbles() {
        const container = document.getElementById('bubbleContainer');
        const emojis = ['🎶', '⭐', '✨', '🎈', '🎸', '🌈', '🔔'];
        
        //৩. বাবলের সংখ্যা ৩০টি করা হলো
        for(let i=0; i<30; i++) {
            let b = document.createElement('div');
            b.className = 'bubble';
            
            //৪. র্যান্ডম সাইজ এবং ইমোজি
            let size = Math.random() * 60 + 25 + 'px';
            let randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            b.style.width = size; 
            b.style.height = size;
            b.innerHTML = randomEmoji;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDelay = Math.random() * 10 + 's';
            b.style.animationDuration = Math.random() * 5 + 8 + 's'; // কিছু বাবল দ্রুত, কিছু ধীরে
            
            container.appendChild(b);
        }
    }

    // ৫. গান ও ক্যাটাগরি ম্যানেজমেন্ট
    function getDirectLink(url) {
        if (url.includes('dropbox.com')) return url.replace('dl=0', 'raw=1');
        return url.startsWith('http') ? url : 'audio/' + url;
    }

    // ৬. ট্যাব চেঞ্জ করার আপডেটেড ফাংশন
    function changeTab(tabName, btnElement) {
        activeTab = tabName;
        
        //৭. সব ট্যাব থেকে active ক্লাস মুছে ফেলো
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        //৮. যেটিতে ক্লিক করা হয়েছে সেটিতে active ক্লাস যোগ করো
        btnElement.classList.add('active');
        
        //৯. গানগুলো রেন্ডার করো
        renderSongs();
    }
    
    function renderSongs() {
        songListDiv.innerHTML = '';
        const filtered = allSongs.filter(s => s.cat === activeTab);
        
        filtered.forEach((song, index) => { // এখানে index যোগ করা হয়েছে
            const idx = allSongs.indexOf(song);
            const card = document.createElement('div');
            card.className = `song-card ${currentIdx === idx ? 'active' : ''}`;
            
            // প্রতিটি কার্ডের জন্য আলাদা ডিলে সেট করা (দুলুনির জন্য)
            card.style.setProperty('--i', index); 
            
            card.onclick = () => playSong(idx);
            card.innerHTML = `
                <div class="fs-3 me-3"><i class="fas ${song.icon}"></i></div>
                <div class="flex-grow-1 text-start">
                    <div class="fw-bold highlight-text">${song.title}</div>
                    <small class="opacity-75">${song.cat}</small>
                </div>
                <i class="fas ${currentIdx === idx ? 'fa-volume-up' : 'fa-play-circle'} fs-4 opacity-50"></i>
            `;
            songListDiv.appendChild(card);
        });
    }
    function playSong(idx) {
		// যদি একই গানে ক্লিক করা হয় এবং সেটি অলরেডি লোড থাকে, তবে নতুন করে লোড করার দরকার নেই
	    if (currentIdx === idx && audio.src !== "") {
	        togglePlay(); 
	        return;
		}
        currentIdx = idx;
        const song = allSongs[idx];
        audio.src = getDirectLink(song.file);
        audio.play().then(() => updateUI(true)).catch(e => console.log("Audio Error"));
        document.getElementById('masterPlay').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        // ১. টাইটেল আপডেট
	    document.getElementById('nowPlayingTitle').innerText = song.title;
	    // ২. ক্যাটাগরি টেক্সট আপডেট
	    const catElement = document.getElementById('nowPlayingCat');
	    catElement.innerText = song.cat;
        renderSongs();
    }

    // ২. বর্তমান ট্যাব অনুযায়ী প্রথম গান প্লে করার লজিক
	function togglePlay() {
	    if (currentIdx === -1) {
	        // বর্তমানে যে ট্যাবটি সিলেক্ট করা আছে, তার গানগুলো ফিল্টার করা
	        const filteredSongs = allSongs.filter(s => s.cat === activeTab);
	        if (filteredSongs.length > 0) {
	            // ফিল্টার করা গানের প্রথম গানটির আসল ইনডেক্স খুঁজে বের করা
	            const firstSongIdx = allSongs.indexOf(filteredSongs[0]);
	            playSong(firstSongIdx);
	        }
	        return;
	    }
	    audio.paused ? audio.play() : audio.pause();
	    updateUI(!audio.paused);
	}

    function updateUI(playing) {
        document.getElementById('masterPlay').innerHTML = playing ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
    }

    function updateProgress() {
        if(audio.duration) {
            document.getElementById('progBar').style.width = (audio.currentTime / audio.duration) * 100 + '%';
        }
    }

    function seek(e) {
        audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
    }

    function nextSong() { playSong((currentIdx + 1) % allSongs.length); }
    function prevSong() { playSong((currentIdx - 1 + allSongs.length) % allSongs.length); }

    // লোড হওয়া মাত্র বাবল এবং গান দেখাও
    createBubbles();
    renderSongs();
</script>

</body>
</html>
