<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও থিয়েটার - কালাইয়া বোর্ড সপ্রাবি</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atma:wght@500;700&family=Hind+Siliguri:wght@400;600;700&display=swap');
        
        :root {
            --primary: #006A4E;
            --kids-yellow: #FFD93D;
            --kids-blue: #4CC9F0;
            --kids-orange: #FF9F1C;
            --kids-red: #FF4D6D;
        }

        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: #f0faff url('https://www.transparenttextures.com/patterns/kids-outline.png');
            overflow-x: hidden;
        }

        h2, h5, button { font-family: 'Atma', cursive; }

        /* হেডার */
        .header-box {
            background: linear-gradient(135deg, var(--primary) 0%, #004d39 100%);
            padding: 40px 0;
            border-bottom: 8px solid var(--kids-yellow);
            border-radius: 0 0 40px 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* ক্যাটাগরি বাটন */
        .btn-cat {
            border: 3px solid white;
            padding: 10px 22px;
            border-radius: 50px;
            margin: 5px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-all { background: var(--kids-blue); color: white; }
        .btn-bn { background: var(--kids-orange); color: white; }
        .btn-en { background: var(--kids-red); color: white; }
        .btn-other { background: var(--kids-yellow); color: #333; }
        
        .btn-cat:hover { transform: scale(1.1); color: white; }

        /* 📱 স্টিকি প্লেয়ার প্যানেল স্টাইল */
        .sticky-theater-panel {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #111;
            border-radius: 0 0 25px 25px;
            border-bottom: 6px solid var(--kids-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; 
            overflow: hidden;
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* প্লেয়ার কন্ট্রোল বার */
        .theater-controls {
            background: #222;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .th-btn {
            width: 48px; height: 48px;
            border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; transition: 0.2s;
        }
        .th-btn:active { transform: scale(0.9); }
        .th-prev { background: var(--kids-orange); }
        .th-play { background: var(--primary); width: 55px; height: 55px; font-size: 22px; border: 3px solid white; }
        .th-next { background: var(--kids-orange); }
        .th-close { background: var(--kids-red); }

        .theater-title {
            color: #fff; background: #000; padding: 8px;
            text-align: center; margin: 0; font-size: 16px; font-weight: bold;
        }

        /* ভিডিও কার্ড গ্রিড */
        .video-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: 0.3s;
        }
        .video-card:hover, .video-card.playing-now { 
            transform: translateY(-5px); 
            border-color: var(--kids-blue); 
            background: #e0f2fe;
        }
        
        .thumb-box { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .play-btn-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s;
        }
        .video-card:hover .play-btn-overlay, .video-card.playing-now .play-btn-overlay { opacity: 1; }
        .play-btn-overlay i { font-size: 50px; color: var(--kids-yellow); }

        /* ব্যাক বাটন */
        .kids-back-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 9999;
            background: linear-gradient(45deg, #FF4D6D, #FF8C42);
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 6px 15px rgba(255, 77, 109, 0.4);
            border: 3px solid white; cursor: pointer; transition: 0.3s;
        }
        .kids-back-btn:hover { transform: scale(1.1) rotate(-15deg); background: #006A4E; }
        .kids-back-btn i { font-size: 24px; }
    </style>
</head>
<body>

<!-- হেডার সেকশন -->
<header class="header-box text-center animate__animated animate__fadeInDown" id="mainHeader">
    <div class="container">
        <h2 class="display-5 fw-bold mb-1">🎬 সোনামণিদের থিয়েটার</h2>
        <p class="fs-6 opacity-75">গান আর ভিডিও দেখে হবে দারুণ মজা!</p>
        
        <div class="mt-3">
            <button class="btn btn-cat btn-all" onclick="filterGallery('all')">সব ভিডিও</button>
            <button class="btn btn-cat btn-bn" onclick="startPlaylistMode('bangla')">ছড়া গান 🎶</button>
            <button class="btn btn-cat btn-en" onclick="startPlaylistMode('english')">English Song 🇬🇧</button>
            <button class="btn btn-cat btn-other" onclick="startPlaylistMode('others')">অন্যান্য 🌟</button>
        </div>
    </div>
</header>

<!-- 📺 টপ স্টিকি প্লেয়ার প্যানেল -->
<div id="stickyTheater" class="sticky-theater-panel">
    <h5 id="theaterTitle" class="theater-title">ভিডিও লোড হচ্ছে...</h5>
    <div class="player-wrapper">
        <div id="mainIframeContainer" style="width:100%; height:100%; position:absolute;"></div>
    </div>
    <div class="theater-controls">
        <button class="th-btn th-prev" onclick="navigatePlaylist(-1)"><i class="fas fa-backward"></i></button>
        <button class="th-btn th-play" onclick="togglePlayback()" id="thPlayBtn"><i class="fas fa-pause"></i></button>
        <button class="th-btn th-next" onclick="navigatePlaylist(1)"><i class="fas fa-forward"></i></button>
        <button class="th-btn th-close" onclick="exitTheaterMode()"><i class="fas fa-times"></i></button>
    </div>
</div>

<!-- ভিডিও লিস্ট গ্রিড -->
<div class="container my-4">
    <div class="row g-3" id="videoGrid">
        <!-- জাভাস্ক্রিপ্ট কার্ডগুলো এখানে লোড হবে -->
    </div>
</div>

<!-- ========================================== -->
<!-- 📜 স্ক্রিপ্ট লোড করার সঠিক এবং নির্ভুল ক্রমানুসার -->
<!-- ========================================== -->

<!-- ১. সবার আগে এক্সটার্নাল ভিডিও ডাটাবেজ ফাইলটি লোড হবে -->
<script src="video-database.js"></script>

<!-- ২. ইউটিউব আইফ্রেম এপিআই স্ক্রিপ্ট -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- ৩. অ্যাপ্লিকেশনের মূল লজিক স্ক্রিপ্ট -->
<script>
    // গ্লোবাল ভেরিয়েবলসমূহ (যা ভিডিও ডাটাবেজ থেকে ডাটা রিড করবে)
    let currentPlaylist = [...videoData];
    let currentIndex = 0;
    let ytPlayer = null;
    let isTheaterActive = false;

    // ১. ভিডিও গ্রিড রেন্ডার ফাংশন
    function renderGallery(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';
        list.forEach((v, index) => {
            const thumbUrl = v.type === 'youtube' 
                ? `https://img.youtube.com/vi/${v.id}/mqdefault.jpg` 
                : `https://images.unsplash.com/photo-1606092195730-5d7b9af1efc5?w=400`; 
            
            const isPlayingClass = (isTheaterActive && index === currentIndex) ? 'playing-now' : '';

            grid.innerHTML += `
                <div class="col-md-6 col-lg-4 animate__animated animate__fadeInUp">
                    <div class="video-card ${isPlayingClass}" onclick="selectVideo(${index})">
                        <div class="thumb-box">
                            <img src="${thumbUrl}" alt="${v.title}">
                            <div class="play-btn-overlay"><i class="fas fa-play-circle animate__animated animate__pulse animate__infinite"></i></div>
                        </div>
                        <div class="p-3 text-center">
                            <h5 class="m-0 text-dark fs-6">${v.title}</h5>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // ২. ফিল্টার ফাংশন
    function filterGallery(category) {
        exitTheaterMode();
        if(category === 'all') currentPlaylist = [...videoData];
        else currentPlaylist = videoData.filter(v => v.cat === category);
        renderGallery(currentPlaylist);
    }

    // ৩. প্লেলিস্ট অটো-প্লে মোড অ্যাক্টিভেশন
    function startPlaylistMode(category) {
        currentPlaylist = videoData.filter(v => v.cat === category);
        if(currentPlaylist.length === 0) return;
        
        isTheaterActive = true;
        document.getElementById('stickyTheater').style.display = 'block'; 
        document.getElementById('mainHeader').style.padding = "20px 0"; 

        selectVideo(0); 
    }

    // ৪. ভিডিও সিলেকশন ও প্লেয়ার ইঞ্জিন
    function selectVideo(index) {
        if (!isTheaterActive) {
            isTheaterActive = true;
            document.getElementById('stickyTheater').style.display = 'block';
        }
        
        currentIndex = index;
        const video = currentPlaylist[currentIndex];
        document.getElementById('theaterTitle').innerText = video.title;
        
        const container = document.getElementById('mainIframeContainer');
        container.innerHTML = ''; 

        if (video.type === 'youtube') {
            container.innerHTML = '<div id="ytActualPlayer"></div>';
            ytPlayer = new YT.Player('ytActualPlayer', {
                height: '100%',
                width: '100%',
                videoId: video.id,
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        } else if (video.type === 'cloudinary') {
            container.innerHTML = `<iframe src="${video.url}&autoplay=true" width="100%" height="100%" allow="autoplay; fullscreen" frameborder="0"></iframe>`;
            ytPlayer = null; 
        }

        document.getElementById('thPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';
        renderGallery(currentPlaylist); 
    }

    // ৫. প্লেলিস্ট নেভিগেশন (Next/Prev)
    function navigatePlaylist(direction) {
        currentIndex += direction;
        if (currentIndex >= currentPlaylist.length) currentIndex = 0; 
        if (currentIndex < 0) currentIndex = currentPlaylist.length - 1;
        selectVideo(currentIndex);
    }

    // ৬. অটো-প্লে নেক্সট ইভেন্ট হ্যান্ডলার
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            navigatePlaylist(1); 
        }
    }

    // ৭. প্লে/পজ কন্ট্রোল
    function togglePlayback() {
        if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
        const state = ytPlayer.getPlayerState();
        const playBtn = document.getElementById('thPlayBtn');
        if (state === 1) {
            ytPlayer.pauseVideo();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            ytPlayer.playVideo();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
    }

    // ৮. থিয়েটার মোড ক্লোজ ফাংশন
    function exitTheaterMode() {
        isTheaterActive = false;
        document.getElementById('stickyTheater').style.display = 'none';
        document.getElementById('mainIframeContainer').innerHTML = '';
        document.getElementById('mainHeader').style.padding = "40px 0";
        if (ytPlayer) {
            ytPlayer.stopVideo();
            ytPlayer = null;
        }
        renderGallery(currentPlaylist);
    }

    // ইউটিউব এপিআই রেডি মেথড
    function onYouTubeIframeAPIReady() {
        // API লোডের জন্য ট্র্যাকিং ট্রিপার
    }

    // পেজ লোড হওয়ার সাথে সাথে গ্যালারি চালু হবে
    window.onload = () => renderGallery(videoData);
</script>

<!-- ৪. বুটস্ট্রাপ স্ক্রিপ্ট ফাইল -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ব্যাক বাটন -->
<button onclick="window.history.back();" class="kids-back-btn" title="আগের পেজে ফিরে যাও">
    <i class="fas fa-arrow-left"></i>
</button>

</body>
</html>
